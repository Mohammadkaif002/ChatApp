<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real-Time Chat Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        #chat-container { max-width: 600px; margin: 50px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        #message-area { height: 400px; overflow-y: auto; border: 1px solid #dee2e6; padding: 10px; margin-bottom: 20px; border-radius: 5px; background: #fff; }
        .message { margin-bottom: 10px; padding: 8px 12px; border-radius: 15px; max-width: 80%; }
        .received { background-color: #e9ecef; align-self: flex-start; }
        .sent { background-color: #007bff; color: white; align-self: flex-end; margin-left: auto; }
        .sender-name { font-size: 0.8rem; font-weight: bold; margin-bottom: 2px; display: block; }
    </style>
</head>
<body>

<div id="chat-container">
    <h2 class="text-center mb-4">Chat Room</h2>
    
    <div id="username-page" class="text-center">
        <input type="text" id="name" class="form-control mb-3" placeholder="Enter your name">
        <button onclick="connect()" class="btn btn-primary w-100">Join Chat</button>
    </div>

    <div id="chat-page" style="display:none;">
        <div id="message-area" class="d-flex flex-column"></div>
        <div class="input-group">
            <input type="text" id="message" class="form-control" placeholder="Type a message...">
            <button onclick="sendMessage()" class="btn btn-primary">Send</button>
        </div>
    </div>
</div>

<script>
    var stompClient = null;
    var username = null;

    function connect() {
        username = document.getElementById('name').value.trim();
        if(username) {
            document.getElementById('username-page').style.display = 'none';
            document.getElementById('chat-page').style.display = 'block';

            var socket = new SockJS('/ws-chat');
            stompClient = Stomp.over(socket);

            stompClient.connect({}, onConnected, onError);
        }
    }

    function onConnected() {
        stompClient.subscribe('/topic/messages', onMessageReceived);
    }

    function onError(error) {
        console.log('Could not connect to WebSocket server. Please refresh this page to try again!');
    }

    function sendMessage() {
        var messageContent = document.getElementById('message').value.trim();
        if(messageContent && stompClient) {
            var chatMessage = {
                sender: username,
                content: messageContent
            };
            stompClient.send("/app/sendMessage", {}, JSON.stringify(chatMessage));
            document.getElementById('message').value = '';
        }
    }

    function onMessageReceived(payload) {
        var message = JSON.parse(payload.body);
        var messageElement = document.createElement('div');
        
        messageElement.classList.add('message');
        if (message.sender === username) {
            messageElement.classList.add('sent');
        } else {
            messageElement.classList.add('received');
        }

        var contentElement = document.createElement('div');
        contentElement.innerHTML = `<span class="sender-name">${message.sender}</span>${message.content}`;
        messageElement.appendChild(contentElement);

        var messageArea = document.getElementById('message-area');
        messageArea.appendChild(messageElement);
        messageArea.scrollTop = messageArea.scrollHeight;
    }

    // Allow Enter key to send message
    document.getElementById('message').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });
</script>

</body>
</html>
